<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 4 "HTML"</title>
</head>
<body>
    <h1><u>Tables In HTML</u></h1>

    <table border="black">
        <caption><b><i><u>Price Lists</u></i></b></caption>
        <tr>
            <th>Items</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Papaya</td>
            <td>56</td>
        </tr>
        <tr>
            <td>Apple</td>
            <td>100</td>
        </tr>
        <tr>
            <td>Watermelon</td>
            <td>70</td>
        </tr>
        <tr>
            <td>Pineapple</td>
            <td>89</td>
        </tr>
    </table>

    <br>
    <br>
    <br> 
    <br><hr>
    <br><hr>


    <h2><u>Sementic Tables</u></h2>

    <table border="black">
        <thead>
            <tr>
                <th>Names</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Manav</td>
                <td>27</td>
            </tr>
            <tr>
                <td>Sujata</td>
                <td>28</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total student</td>
                <td>02</td>
            </tr>
        </tfoot>
    </table>


    <br>
    <br>
    <br> 
    <br><hr>
    <br><hr>


    <h2><u>Colspan & Row-span Tables</u></h2>

    <table border="black">
        <caption>Lists</caption>

        <thead>
            <tr>
                <th rowspan="2">Items</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
                <td>0.1</td>
            </tr>
            <tr>
                <td>Maggi</td>
                <td>25</td>
                <td>0.25</td>
            </tr>
            <tr>
                <td>Chilli Chicken</td>
                <td>200</td>
                <td>02</td>
            </tr>
        </tbody>
        <tfoot></tfoot>

    </table>


    <br>
    <br>
    <br> 
    <br><hr>
    <br><hr>
</body>
</html>
